[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
startup_mode = "Maximized"

[scrolling]
history = 30000

[font]
size = 14.0

[font.normal]
family = "MesloLGS NF"

# Colors (Dracula)
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"

[colors.normal]
black   = "#000000"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#bbbbbb"

[colors.bright]
black   = "#555555"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#caa9fa"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#ffffff"
